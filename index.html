<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="影视资源聚合平台 - 海量高清影视在线观看"
    />
    <title>影视 - 首页</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
    /></noscript>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <div class="logo-icon">🎬</div>
          <div class="logo-text">影视</div>
        </a>

        <nav class="nav-menu">
          <a
            href="#"
            class="nav-item active"
            onclick="
              App.showHome();
              return false;
            "
            >首页</a
          >
          <a
            href="#"
            class="nav-item"
            onclick="
              App.showHistory();
              return false;
            "
            >历史</a
          >
          <a
            href="#"
            class="nav-item"
            onclick="
              App.showFavorites();
              return false;
            "
            >收藏</a
          >
        </nav>

        <div class="header-actions">
          <div class="search-box">
            <input
              type="text"
              class="search-input"
              id="search-input"
              placeholder="搜索影视..."
            />
            <button class="search-btn" id="search-btn">🔍</button>
          </div>

          <button
            class="theme-toggle-btn"
            id="theme-toggle-btn"
            onclick="App.toggleTheme()"
            title="切换主题"
          >
            🌙
          </button>

          <div class="source-selector">
            <button
              class="source-selector-btn"
              id="source-selector-btn"
              onclick="UI.showSourceModal()"
            >
              <span class="source-indicator"></span>
              <span>数据源</span>
              <span>▼</span>
            </button>
          </div>

          <button class="mobile-menu-btn" id="mobile-menu-btn">☰</button>
          <button class="mobile-search-btn" id="mobile-search-btn">🔍</button>
        </div>
      </div>
    </header>

    <div class="mobile-search-bar" id="mobile-search-bar">
      <div class="mobile-search-inner">
        <input
          type="text"
          class="search-input"
          id="mobile-search-input"
          placeholder="搜索影视..."
        />
        <button class="search-btn" id="mobile-search-submit">🔍</button>
      </div>
    </div>

    <main class="main-content">
      <section
        class="collection-section"
        id="collection-section"
        style="display: none"
      >
        <div class="container">
          <div class="section-header">
            <h2 class="section-title">
              <span id="collection-title">历史记录</span>
            </h2>
            <div>
              <button
                class="btn btn-secondary btn-sm"
                id="collection-clear-btn"
                style="display: none"
              >
                清空历史
              </button>
              <button class="btn btn-secondary btn-sm" onclick="App.showHome()">
                返回首页
              </button>
            </div>
          </div>
          <div id="collection-container"></div>
        </div>
      </section>

      <nav class="category-nav" id="category-nav">
        <div class="container">
          <div class="category-list" id="category-list">
            <button class="category-item active" data-id="0">全部</button>
          </div>
        </div>
      </nav>

      <section class="section">
        <div class="container">
          <div class="section-header">
            <h2 class="section-title">
              <span id="section-title-text">最新影视</span>
            </h2>
            <div class="source-selector">
              <button
                class="btn btn-secondary btn-sm"
                onclick="UI.showSourceModal()"
              >
                ⚙️ 管理数据源
              </button>
            </div>
          </div>

          <div id="video-container">
            <div class="loading-overlay active" id="initial-loading">
              <div class="loading-spinner"></div>
              <div class="loading-text">正在加载影视数据...</div>
            </div>
          </div>

          <div id="pagination-container"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-logo">影视</div>
          <p class="footer-desc">聚合多源影视资源，提供高清流畅的观影体验</p>
          <div class="footer-links">
            <a href="index.html" class="footer-link">首页</a>
          </div>
          <p class="footer-copyright">© 2024 影视 - 仅供学习交流使用</p>
        </div>
      </div>
    </footer>

    <div class="modal-overlay" id="source-modal">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">数据源管理</h3>
          <button class="modal-close" onclick="UI.hideModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">数据源名称</label>
            <input
              type="text"
              class="form-input"
              id="source-name-input"
              placeholder="例如：数据源1"
            />
          </div>
          <div class="form-group">
            <label class="form-label">API地址</label>
            <input
              type="text"
              class="form-input"
              id="source-url-input"
              placeholder="例如：https://api.example.com/api.php/provide/vod/"
            />
          </div>
          <button
            class="btn btn-primary"
            style="width: 100%"
            onclick="App.addSource()"
          >
            添加数据源
          </button>

          <div class="source-list" id="source-list"></div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="src/js/config.js"></script>
    <script src="src/js/store.js"></script>
    <script src="src/js/api.js"></script>
    <script src="src/js/ui.js"></script>
    <script>
      // 自动识别视频的额外标签
      function extractTags(video) {
        const tags = video.type_name ? [video.type_name] : [];
        const name = video.vod_name || "";

        // 题材标签
        if (/复仇者|钢铁侠|蜘蛛侠|蝙蝠侠|超人|X战警/.test(name))
          tags.push("超级英雄");
        if (/悬疑|推理|侦探|凶手|案件/.test(name)) tags.push("悬疑");
        if (/爱情|恋爱|情侣|浪漫/.test(name)) tags.push("爱情");
        if (/喜剧|搞笑|爆笑/.test(name)) tags.push("喜剧");
        if (/恐怖|惊悚|鬼|僵尸/.test(name)) tags.push("恐怖");
        if (/动作|功夫|武打|格斗/.test(name)) tags.push("动作");
        if (/科幻|未来|太空|机器人/.test(name)) tags.push("科幻");
        if (/战争|军事|二战/.test(name)) tags.push("战争");
        if (/古装|宫廷|穿越/.test(name)) tags.push("古装");
        if (/都市|职场|现代/.test(name)) tags.push("都市");

        return [...new Set(tags)].slice(0, 3); // 最多3个标签
      }

      const App = {
        currentPage: 1,
        currentCategory: 0,
        categories: [],
        searchKeyword: "",
        loadingController: null,
        currentView: "home", // "home" | "history" | "favorites"

        async init() {
          ThemeManager.init();
          this.updateThemeIcon();
          this.bindEvents();
          UI.updateSourceSelector();
          await this.loadData();
        },

        bindEvents() {
          const searchInput = document.getElementById("search-input");
          const searchBtn = document.getElementById("search-btn");

          searchBtn.addEventListener("click", () => this.handleSearch());
          searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") this.handleSearch();
          });

          // 移动端搜索
          const mobileSearchBtn = document.getElementById("mobile-search-btn");
          const mobileSearchInput = document.getElementById(
            "mobile-search-input",
          );
          const mobileSearchSubmit = document.getElementById(
            "mobile-search-submit",
          );

          if (mobileSearchBtn) {
            mobileSearchBtn.addEventListener("click", () =>
              this.toggleMobileSearch(),
            );
          }
          if (mobileSearchSubmit) {
            mobileSearchSubmit.addEventListener("click", () =>
              this.handleMobileSearch(),
            );
          }
          if (mobileSearchInput) {
            mobileSearchInput.addEventListener("keypress", (e) => {
              if (e.key === "Enter") this.handleMobileSearch();
            });
          }
        },

        toggleMobileSearch() {
          const bar = document.getElementById("mobile-search-bar");
          bar.classList.toggle("active");
          if (bar.classList.contains("active")) {
            document.getElementById("mobile-search-input").focus();
          }
        },

        handleMobileSearch() {
          const input = document.getElementById("mobile-search-input");
          this.searchKeyword = input.value.trim();
          this.currentPage = 1;
          document
            .getElementById("mobile-search-bar")
            .classList.remove("active");
          this.showHome();
          this.loadData();
        },

        handleSearch() {
          const input = document.getElementById("search-input");
          this.searchKeyword = input.value.trim();
          this.currentPage = 1;
          this.loadData();
        },

        async loadData() {
          this.isLoading = true;

          try {
            const loading = document.getElementById("initial-loading");
            if (loading) loading.style.display = "flex";

            const data = await API.getVideoList({
              page: this.currentPage,
              type: this.currentCategory || undefined,
              keyword: this.searchKeyword || undefined,
            });

            if (loading) loading.style.display = "none";

            // 只在无筛选时更新分类列表，避免筛选后分类被覆盖为空
            if (
              !this.currentCategory &&
              !this.searchKeyword &&
              data.class &&
              data.class.length > 0
            ) {
              this.categories = data.class;
              this.renderCategories();
            } else if (
              this.categories.length === 0 &&
              data.class &&
              data.class.length > 0
            ) {
              this.categories = data.class;
              this.renderCategories();
            }
            this.renderVideos(data);

            document.getElementById("section-title-text").textContent = this
              .searchKeyword
              ? `搜索: ${this.searchKeyword}`
              : this.currentCategory
                ? this.getCategoryName(this.currentCategory)
                : "最新影视";
          } catch (error) {
            // 被新请求取消的旧请求，静默忽略
            if (error.message === "请求超时，请检查网络连接" && this.isLoading)
              return;
            console.error("Load data error:", error);
            UI.showToast(error.message || "加载数据失败", "error");
            document.getElementById("video-container").innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">😢</div>
                            <h3 class="empty-title">加载失败</h3>
                            <p class="empty-desc">${error.message || "请检查数据源配置"}</p>
                            <button class="btn btn-primary" onclick="App.loadData()">重试</button>
                        </div>
                    `;
          } finally {
            this.isLoading = false;
          }
        },

        renderCategories() {
          const container = document.getElementById("category-list");
          let html = `<button class="category-item ${this.currentCategory === 0 ? "active" : ""}" 
                                    onclick="App.selectCategory(0)">全部</button>`;

          this.categories.forEach((cat) => {
            html += `<button class="category-item ${this.currentCategory === cat.type_id ? "active" : ""}" 
                                     onclick="App.selectCategory(${cat.type_id})">${cat.type_name}</button>`;
          });

          container.innerHTML = html;
        },

        selectCategory(categoryId) {
          this.currentCategory = categoryId;
          this.currentPage = 1;
          this.searchKeyword = "";
          document.getElementById("search-input").value = "";
          this.renderCategories();
          this.loadData();
        },

        getCategoryName(typeId) {
          const cat = this.categories.find((c) => c.type_id === typeId);
          return cat ? cat.type_name : "最新影视";
        },

        renderVideos(data) {
          const container = document.getElementById("video-container");
          container.innerHTML = UI.renderVideoGrid(data.list);

          const paginationContainer = document.getElementById(
            "pagination-container",
          );
          paginationContainer.innerHTML = UI.renderPagination(
            data.page,
            data.pagecount,
            "App.goToPage",
          );

          if (data.list && data.list.length > 0) {
            setTimeout(() => UI.loadPostersAsync(data.list), 100);
          }
        },

        goToPage(page) {
          if (page < 1) return;
          this.currentPage = page;
          this.loadData();
          window.scrollTo({ top: 0, behavior: "smooth" });
        },

        goToDetail(videoId) {
          window.location.href = `detail.html?id=${videoId}`;
        },

        showSourceModal() {
          const modal = document.getElementById("source-modal");
          modal.classList.add("active");
          this.renderSourceList();
        },

        renderSourceList() {
          const sources = SourceManager.getSources();
          const currentSource = SourceManager.getCurrentSource();
          const container = document.getElementById("source-list");
          container.innerHTML = UI.renderSourceList(sources, currentSource?.id);
        },

        addSource() {
          const nameInput = document.getElementById("source-name-input");
          const urlInput = document.getElementById("source-url-input");

          const name = nameInput.value.trim();
          const url = urlInput.value.trim();

          if (!name) {
            UI.showToast("请输入数据源名称", "error");
            return;
          }

          if (!url) {
            UI.showToast("请输入API地址", "error");
            return;
          }

          if (!url.startsWith("http://") && !url.startsWith("https://")) {
            UI.showToast("API地址必须以http://或https://开头", "error");
            return;
          }

          try {
            const source = SourceManager.addSource({ name, url });
            UI.showToast(`数据源 "${name}" 添加成功`, "success");
            nameInput.value = "";
            urlInput.value = "";
            this.renderSourceList();
            UI.updateSourceSelector();
          } catch (error) {
            UI.showToast("添加数据源失败", "error");
          }
        },

        deleteSource(sourceId) {
          if (!confirm("确定要删除这个数据源吗？")) return;

          const success = SourceManager.deleteSource(sourceId);
          if (success) {
            UI.showToast("数据源已删除", "success");
            this.renderSourceList();
            UI.updateSourceSelector();
            this.loadData();
          } else {
            UI.showToast("至少需要保留一个数据源", "error");
          }
        },

        switchSource(sourceId) {
          SourceManager.setCurrentSource(sourceId);
          this.renderSourceList();
          UI.updateSourceSelector();
          UI.hideModal();
          this.currentPage = 1;
          this.currentCategory = 0;
          this.searchKeyword = "";
          this.loadData();
        },

        // 视图切换
        _setActiveNav(view) {
          document.querySelectorAll(".nav-menu .nav-item").forEach((el) => {
            el.classList.remove("active");
          });
          const idx = { home: 0, history: 1, favorites: 2 }[view] || 0;
          const items = document.querySelectorAll(".nav-menu .nav-item");
          if (items[idx]) items[idx].classList.add("active");
        },

        showHome() {
          this.currentView = "home";
          this._setActiveNav("home");
          document.getElementById("collection-section").style.display = "none";
          document.getElementById("category-nav").style.display = "";
          document.querySelector(".section").style.display = "";
        },

        showHistory() {
          this.currentView = "history";
          this._setActiveNav("history");
          document.getElementById("category-nav").style.display = "none";
          document.querySelector(".section").style.display = "none";
          document.getElementById("collection-section").style.display = "";
          document.getElementById("collection-title").textContent = "历史记录";

          const clearBtn = document.getElementById("collection-clear-btn");
          clearBtn.style.display = "";
          clearBtn.textContent = "清空历史";
          clearBtn.onclick = () => {
            if (!confirm("确定要清空所有历史记录吗？")) return;
            HistoryManager.clear();
            this.showHistory();
          };

          const list = HistoryManager.getAll();
          this._renderCollection(list);
        },

        showFavorites() {
          this.currentView = "favorites";
          this._setActiveNav("favorites");
          document.getElementById("category-nav").style.display = "none";
          document.querySelector(".section").style.display = "none";
          document.getElementById("collection-section").style.display = "";
          document.getElementById("collection-title").textContent = "我的收藏";
          document.getElementById("collection-clear-btn").style.display =
            "none";

          const list = FavoriteManager.getAll();
          this._renderCollection(list);
        },

        _renderCollection(list) {
          const container = document.getElementById("collection-container");
          if (!list || list.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <div class="empty-icon">🎬</div>
                <h3 class="empty-title">暂无数据</h3>
                <p class="empty-desc">${this.currentView === "history" ? "还没有观看记录" : "还没有收藏内容"}</p>
              </div>`;
            return;
          }

          const isHistory = this.currentView === "history";
          const isFavorites = this.currentView === "favorites";

          const cards = list
            .map(
              (item, i) => `
            <div class="video-card fade-in" style="--i:${i}">
              ${
                isHistory || isFavorites
                  ? `
                <button class="video-card-delete" onclick="event.stopPropagation(); App.deleteCollectionItem(${item.videoId})" title="删除">
                  ✕
                </button>
              `
                  : ""
              }
              <div class="video-card-content" onclick="App.goToDetail(${item.videoId})">
                <div class="video-poster">
                  <div class="video-poster-placeholder">
                    ${item.pic ? `<img src="${item.pic}" alt="${item.name}" loading="lazy">` : "<span>🎬</span>"}
                  </div>
                </div>
                <div class="video-info">
                  <h3 class="video-name">${item.name}</h3>
                  ${item.lastEp ? `<div class="video-tags"><span class="video-tag">${item.lastEp}</span></div>` : ""}
                </div>
              </div>
            </div>`,
            )
            .join("");

          container.innerHTML = `<div class="video-grid">${cards}</div>`;
        },

        deleteCollectionItem(videoId) {
          if (this.currentView === "history") {
            HistoryManager.remove(videoId);
            UI.showToast("已删除历史记录", "success");
            this.showHistory();
          } else if (this.currentView === "favorites") {
            FavoriteManager.remove(videoId);
            UI.showToast("已取消收藏", "success");
            this.showFavorites();
          }
        },

        toggleTheme() {
          const newTheme = ThemeManager.toggle();
          this.updateThemeIcon();
          UI.showToast(
            newTheme === "dark" ? "已切换到深色模式" : "已切换到浅色模式",
            "success",
          );
        },

        updateThemeIcon() {
          const btn = document.getElementById("theme-toggle-btn");
          if (btn) {
            const theme = ThemeManager.getTheme();
            btn.textContent = theme === "dark" ? "🌙" : "☀️";
          }
        },
      };

      document.addEventListener("DOMContentLoaded", () => App.init());
    </script>
  </body>
</html>
