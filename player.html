<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="视频播放" />
    <title>视频播放</title>
    <link rel="stylesheet" href="src/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap"
    /></noscript>
    <script defer src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
      /* All player styles are in style.css */
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <div class="logo-icon">🎬</div>
          <div class="logo-text">影视</div>
        </a>

        <nav class="nav-menu">
          <a href="index.html" class="nav-item">首页</a>
        </nav>

        <div class="header-actions">
          <div class="source-selector">
            <button
              class="source-selector-btn"
              onclick="window.location.href = 'index.html'"
            >
              <span>返回首页</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <section class="player-page">
        <div class="container">
          <a href="#" class="back-btn" id="back-btn"> ← 返回详情 </a>

          <div class="video-info-bar">
            <div class="video-title-section">
              <h1 id="video-title">加载中...</h1>
              <div class="video-episode-info" id="video-episode-info"></div>
            </div>
            <div class="quality-badge" id="quality-badge">HLS</div>
          </div>

          <div class="player-wrapper">
            <div class="video-container">
              <video
                id="video-player"
                controls
                playsinline
                x5-video-player-type="h5"
                x5-video-player-fullscreen="true"
                webkit-playsinline
              >
                您的浏览器不支持视频播放
              </video>
              <div class="player-overlay" id="player-overlay">
                <div class="loading-spinner" id="loading-spinner"></div>
                <div
                  class="play-btn-large"
                  id="play-btn-large"
                  style="display: none"
                >
                  ▶
                </div>
              </div>
            </div>
          </div>

          <div class="player-controls-bar" id="player-controls-bar">
            <div class="control-group">
              <span class="control-label">SPEED</span>
              <div class="control-options" id="speed-options"></div>
            </div>
            <div class="control-group" id="quality-group" style="display: none">
              <span class="control-label">QUALITY</span>
              <div class="control-options" id="quality-options"></div>
            </div>
          </div>

          <div class="episode-selector" id="episode-selector">
            <div class="episode-selector-title">选集</div>
            <div class="episode-list" id="episode-list"></div>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-logo">影视</div>
          <p class="footer-copyright">© 2024 影视 - 仅供学习交流使用</p>
        </div>
      </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="src/js/config.js"></script>
    <script src="src/js/api.js"></script>
    <script src="src/js/ui.js"></script>
    <script>
      const PlayerApp = {
        videoId: null,
        sourceIndex: 0,
        episodeIndex: 0,
        videoName: "",
        videoData: null,
        hls: null,
        video: null,
        currentSpeed: 1,

        init() {
          this.video = document.getElementById("video-player");

          const urlParams = new URLSearchParams(window.location.search);
          this.videoId = urlParams.get("id");
          this.sourceIndex = parseInt(urlParams.get("source")) || 0;
          this.episodeIndex = parseInt(urlParams.get("ep")) || 0;
          this.videoName = decodeURIComponent(
            urlParams.get("name") || "未知视频",
          );

          if (!this.videoId) {
            this.showError("缺少视频ID参数");
            return;
          }

          document.getElementById("back-btn").href =
            `detail.html?id=${this.videoId}`;
          document.getElementById("video-title").textContent = this.videoName;

          this.renderSpeedOptions();
          this.loadVideoData();
        },

        async loadVideoData() {
          try {
            this.showLoading(true);

            const data = await API.getVideoDetail(this.videoId);

            if (!data) {
              this.showError("未找到该影视信息");
              return;
            }

            this.videoData = data;
            this.renderEpisodes();
            this.playEpisode(this.episodeIndex);
          } catch (error) {
            console.error("Load video data error:", error);
            this.showError(error.message || "加载视频数据失败");
          }
        },

        renderEpisodes() {
          const sources = this.videoData.playSources || [];
          const m3u8Sources = sources.filter((s) => s.isM3u8);
          const displaySources = m3u8Sources.length > 0 ? m3u8Sources : sources;

          if (displaySources.length === 0) {
            document.getElementById("episode-selector").style.display = "none";
            return;
          }

          const source = displaySources[this.sourceIndex] || displaySources[0];
          if (!source) {
            document.getElementById("episode-selector").style.display = "none";
            return;
          }

          const container = document.getElementById("episode-list");
          container.innerHTML = source.episodes
            .map(
              (ep, index) => `
                    <button class="episode-btn ${index === this.episodeIndex ? "active" : ""}" 
                            onclick="PlayerApp.playEpisode(${index})">
                        ${ep.name}
                    </button>
                `,
            )
            .join("");
        },

        playEpisode(episodeIndex) {
          const sources = this.videoData.playSources || [];
          const m3u8Sources = sources.filter((s) => s.isM3u8);
          const displaySources = m3u8Sources.length > 0 ? m3u8Sources : sources;

          const source = displaySources[this.sourceIndex] || displaySources[0];
          if (!source || !source.episodes[episodeIndex]) {
            UI.showToast("剧集不存在", "error");
            return;
          }

          this.episodeIndex = episodeIndex;
          const episode = source.episodes[episodeIndex];

          document.getElementById("video-episode-info").textContent =
            `正在播放: ${episode.name}`;
          document.title = `${this.videoName} - ${episode.name} - 影视`;

          this.renderEpisodes();

          this.loadVideoUrl(episode.url);

          const newUrl = `player.html?id=${this.videoId}&source=${this.sourceIndex}&ep=${episodeIndex}&name=${encodeURIComponent(this.videoName)}`;
          history.replaceState(null, "", newUrl);
        },

        useProxy: false,

        createHls(useProxy) {
          const hlsConfig = {
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            enableWorker: true,
          };
          if (useProxy) {
            hlsConfig.xhrSetup = function (xhr, url) {
              xhr.open(
                "GET",
                Config.PROXY_URL + "?url=" + encodeURIComponent(url),
                true,
              );
            };
          }
          return new Hls(hlsConfig);
        },

        loadVideoUrl(url) {
          this.showLoading(true);
          this.useProxy = false;
          this._bindVideoEvents();
          this._loadHls(url, false);
        },

        _bindVideoEvents() {
          if (this._eventsBound) return;
          this._eventsBound = true;
          this.video.addEventListener("waiting", () => this.showLoading(true));
          this.video.addEventListener("playing", () => this.showLoading(false));
          this.video.addEventListener("canplay", () => this.showLoading(false));
        },

        _loadHls(url, useProxy) {
          if (this.hls) {
            this.hls.destroy();
            this.hls = null;
          }

          const isM3u8 = url.includes(".m3u8");

          if (isM3u8 && Hls.isSupported()) {
            this.useProxy = useProxy;
            this.hls = this.createHls(useProxy);

            this.hls.loadSource(url);
            this.hls.attachMedia(this.video);

            this.hls.on(Hls.Events.MANIFEST_PARSED, () => {
              this.showLoading(false);
              this.video.playbackRate = this.currentSpeed;
              this.renderQualityOptions();
              this.video.play().catch((e) => {
                console.log("Auto-play prevented:", e);
                this.showPlayButton();
              });
            });

            this.hls.on(Hls.Events.ERROR, (event, data) => {
              console.error("HLS error:", data);
              if (data.fatal) {
                switch (data.type) {
                  case Hls.ErrorTypes.NETWORK_ERROR:
                    if (!this.useProxy) {
                      console.log(
                        "Direct access failed, retrying via proxy...",
                      );
                      UI.showToast("正在切换线路重试...", "error");
                      this._loadHls(url, true);
                      return;
                    }
                    this.showError("视频加载失败，请尝试其他播放源");
                    this.hls.destroy();
                    break;
                  case Hls.ErrorTypes.MEDIA_ERROR:
                    UI.showToast("媒体错误，正在恢复...", "error");
                    this.hls.recoverMediaError();
                    break;
                  default:
                    this.showError("视频加载失败，请尝试其他播放源");
                    this.hls.destroy();
                    break;
                }
              }
            });
          } else if (this.video.canPlayType("application/vnd.apple.mpegurl")) {
            this.video.src = url;
            document.getElementById("quality-group").style.display = "none";
            this.video.addEventListener(
              "loadedmetadata",
              () => {
                this.showLoading(false);
                this.video.playbackRate = this.currentSpeed;
                this.video.play().catch((e) => {
                  console.log("Auto-play prevented:", e);
                  this.showPlayButton();
                });
              },
              { once: true },
            );

            this.video.addEventListener(
              "error",
              () => {
                this.showError("视频加载失败");
              },
              { once: true },
            );
          } else {
            this.video.src = url;
            document.getElementById("quality-group").style.display = "none";
            this.video.addEventListener(
              "loadedmetadata",
              () => {
                this.showLoading(false);
                this.video.playbackRate = this.currentSpeed;
                this.video.play().catch((e) => {
                  console.log("Auto-play prevented:", e);
                  this.showPlayButton();
                });
              },
              { once: true },
            );
          }
        },

        showLoading(show) {
          const overlay = document.getElementById("player-overlay");
          const spinner = document.getElementById("loading-spinner");
          const playBtn = document.getElementById("play-btn-large");

          if (show) {
            overlay.classList.add("loading");
            overlay.style.opacity = "1";
            spinner.style.display = "block";
            playBtn.style.display = "none";
          } else {
            overlay.classList.remove("loading");
            overlay.style.opacity = "0";
            spinner.style.display = "none";
          }
        },

        showPlayButton() {
          const overlay = document.getElementById("player-overlay");
          const spinner = document.getElementById("loading-spinner");
          const playBtn = document.getElementById("play-btn-large");

          overlay.classList.remove("loading");
          overlay.style.opacity = "1";
          spinner.style.display = "none";
          playBtn.style.display = "flex";

          playBtn.onclick = () => {
            this.video.play();
            overlay.style.opacity = "0";
          };
        },

        showError(message) {
          this.showLoading(false);

          const container = document.querySelector(".video-container");
          container.innerHTML = `
                    <div class="player-error">
                        <div class="player-error-icon">😢</div>
                        <h3 class="player-error-title">播放失败</h3>
                        <p class="player-error-desc">${message}</p>
                        <button class="btn btn-primary" onclick="window.location.href='detail.html?id=${this.videoId}'">
                            返回详情页
                        </button>
                    </div>
                `;
        },

        renderSpeedOptions() {
          const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
          const container = document.getElementById("speed-options");
          container.innerHTML = speeds
            .map(
              (s) =>
                `<button class="control-option ${s === this.currentSpeed ? "active" : ""}" onclick="PlayerApp.setSpeed(${s})">${s}x</button>`,
            )
            .join("");
        },

        setSpeed(rate) {
          this.currentSpeed = rate;
          this.video.playbackRate = rate;
          this.renderSpeedOptions();
        },

        renderQualityOptions() {
          const group = document.getElementById("quality-group");
          const container = document.getElementById("quality-options");

          if (!this.hls || !this.hls.levels || this.hls.levels.length === 0) {
            group.style.display = "none";
            return;
          }

          group.style.display = "";

          if (this.hls.levels.length === 1) {
            container.innerHTML = `<button class="control-option active">默认</button>`;
            return;
          }

          const currentLevel = this.hls.currentLevel;
          let html = `<button class="control-option ${currentLevel === -1 ? "active" : ""}" onclick="PlayerApp.setQuality(-1)">自动</button>`;
          this.hls.levels.forEach((level, i) => {
            const label = level.height ? level.height + "p" : "Level " + i;
            html += `<button class="control-option ${currentLevel === i ? "active" : ""}" onclick="PlayerApp.setQuality(${i})">${label}</button>`;
          });
          container.innerHTML = html;
        },

        setQuality(levelIndex) {
          if (!this.hls) return;
          this.hls.currentLevel = levelIndex;
          this.renderQualityOptions();
        },
      };

      document.addEventListener("DOMContentLoaded", () => PlayerApp.init());
    </script>
  </body>
</html>
